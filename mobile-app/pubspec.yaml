name: threeboxes_jobs
description: "3 Boxes Jobs Portal - AI-Powered Job Search & Career Platform"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  flutter_launcher_icons: ^0.14.1
  camera: ^0.11.0+2
  webview_flutter: ^4.10.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#00C853"
  adaptive_icon_foreground: "assets/icon.png"
